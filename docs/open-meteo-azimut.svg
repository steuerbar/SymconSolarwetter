<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Open-Meteo-Azimut für die Ausrichtung einer PV-Anlage</title>
  <desc id="desc">Kompassgrafik: Süden entspricht 0 Grad, Südost minus 45 Grad, Osten minus 90 Grad, Südwest plus 45 Grad, Westen plus 90 Grad und Norden plus oder minus 180 Grad.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fafc"/>
      <stop offset="1" stop-color="#edf3f8"/>
    </linearGradient>
    <linearGradient id="south" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd84c"/>
      <stop offset="1" stop-color="#ef8f22"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1f3142" flood-opacity=".14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef8f22"/>
    </marker>
  </defs>

  <rect width="960" height="560" rx="28" fill="url(#bg)"/>
  <text x="52" y="61" fill="#1f3142" font-family="Arial, sans-serif" font-size="28" font-weight="700">Welche Zahl gehört in das Feld „Open-Meteo-Azimut“?</text>
  <text x="52" y="94" fill="#607487" font-family="Arial, sans-serif" font-size="17">Entscheidend ist die Himmelsrichtung, in welche die Vorderseite der Solarmodule zeigt.</text>

  <g transform="translate(312 324)" filter="url(#shadow)">
    <circle r="190" fill="#fff" stroke="#dce6ed" stroke-width="3"/>
    <circle r="145" fill="none" stroke="#dce6ed" stroke-width="2" stroke-dasharray="5 7"/>
    <path d="M0 0 L-40 118 A125 125 0 0 0 40 118 Z" fill="url(#south)" opacity=".9"/>
    <line x1="0" y1="0" x2="0" y2="126" stroke="#ef8f22" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
    <circle r="11" fill="#1f3142"/>
  </g>

  <g fill="#1f3142" font-family="Arial, sans-serif" text-anchor="middle">
    <text x="312" y="154" font-size="18" font-weight="700">NORD</text>
    <text x="312" y="178" font-size="17">±180°</text>

    <text x="502" y="315" font-size="18" font-weight="700">OST</text>
    <text x="502" y="339" font-size="17">−90°</text>

    <text x="312" y="486" font-size="18" font-weight="700">SÜD</text>
    <text x="312" y="510" fill="#d87416" font-size="19" font-weight="700">0°</text>

    <text x="122" y="315" font-size="18" font-weight="700">WEST</text>
    <text x="122" y="339" font-size="17">+90°</text>

    <text x="455" y="447" font-size="15" font-weight="700">SÜDOST</text>
    <text x="455" y="469" font-size="16">−45°</text>

    <text x="169" y="447" font-size="15" font-weight="700">SÜDWEST</text>
    <text x="169" y="469" font-size="16">+45°</text>
  </g>

  <g transform="translate(570 142)">
    <rect width="338" height="330" rx="20" fill="#fff" stroke="#dce6ed" stroke-width="2"/>
    <text x="28" y="45" fill="#1f3142" font-family="Arial, sans-serif" font-size="21" font-weight="700">Schnellauswahl</text>

    <g font-family="Arial, sans-serif" font-size="17">
      <text x="28" y="91" fill="#607487">Dach zeigt nach Süden</text>
      <text x="296" y="91" fill="#d87416" text-anchor="end" font-weight="700">0°</text>
      <line x1="28" y1="108" x2="310" y2="108" stroke="#e7edf2"/>

      <text x="28" y="137" fill="#607487">Dach zeigt nach Südost</text>
      <text x="296" y="137" fill="#1f3142" text-anchor="end" font-weight="700">−45°</text>
      <line x1="28" y1="154" x2="310" y2="154" stroke="#e7edf2"/>

      <text x="28" y="183" fill="#607487">Dach zeigt nach Ost</text>
      <text x="296" y="183" fill="#1f3142" text-anchor="end" font-weight="700">−90°</text>
      <line x1="28" y1="200" x2="310" y2="200" stroke="#e7edf2"/>

      <text x="28" y="229" fill="#607487">Dach zeigt nach Südwest</text>
      <text x="296" y="229" fill="#1f3142" text-anchor="end" font-weight="700">+45°</text>
      <line x1="28" y1="246" x2="310" y2="246" stroke="#e7edf2"/>

      <text x="28" y="275" fill="#607487">Dach zeigt nach West</text>
      <text x="296" y="275" fill="#1f3142" text-anchor="end" font-weight="700">+90°</text>
    </g>

    <rect x="24" y="293" width="290" height="22" rx="11" fill="#fff3d6"/>
    <text x="169" y="309" fill="#9a601c" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">Open-Meteo zählt von Süden aus.</text>
  </g>
</svg>
